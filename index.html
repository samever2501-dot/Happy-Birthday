<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic Surprise 🎭🌸🎁</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;  
    background: black;
}

/* 🎭 CURTAINS */
.curtain {
    position: fixed;
    top: 0;
    width: 50%;
    height: 100%;
    background: linear-gradient(180deg, #3a0a0a, #7a1414);
    transition: 1.8s ease;
    z-index: 10;
    cursor: pointer;
}

.left { left: 0; }
.right { right: 0; }

.open .left { transform: translateX(-100%); }
.open .right { transform: translateX(100%); }

/* 🌸 SCENE */
.scene {
    position: absolute;
    width: 100%;
    height: 100vh;
   background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    opacity: 0;
}

.showScene {
    opacity: 1;
}

/* 🌸 FLOWERS */
.flower {
    position: absolute;
    width: 45px;
    height: 45px;
    animation: floatUp 7s linear forwards;
    pointer-events: none;
    filter: drop-shadow(0 0 8px rgba(255,192,203,0.6));
}


@keyframes floatUp {
    0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

/* 🎁 PRESENT */
#present {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 80px;
    cursor: pointer;
    display: none;
    z-index: 20;
}

/* 💥 EXPLOSION */
.piece {
    position: absolute;
    width: 15px;
    height: 15px;
    background: red;
    animation: boom 0.8s ease-out forwards;
}

@keyframes boom {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: translate(var(--x), var(--y)) rotate(720deg); opacity: 0; }
}

/* 💌 CARD */
#card {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 320px;
    height: 420px;
    transform: translate(-50%, -50%) scale(0);
    background: white;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.5s;
    z-index: 30;
}

#card.show {
    transform: translate(-50%, -50%) scale(1);
}

/* 📄 PAGES (HIDDEN SYSTEM) */
.page {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
}

.page.active {
    display: block;
}

.page img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
/* 📌 SWIPE TEXT (BOTTOM) */
#swipeText {
    position: absolute;
    bottom: 10px;
    width: 100%;
    text-align: center;
    font-size: 14px;
    color: white;
    text-shadow: 0 0 5px black;
    z-index: 40;
}
/* 👉 SWIPE LAYER (IMPORTANT) */
#swipeLayer {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 100;
}
.page img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

audio { display: none; }
</style>
</head>

<body>

<!-- 🎭 CURTAINS -->
<div class="curtain left" onclick="openCurtain()"></div>
<div class="curtain right" onclick="openCurtain()"></div>

<!-- 🌸 SCENE (YOU WERE MISSING THIS!) -->
<div class="scene" id="scene">
    <!-- 🎁 PRESENT -->
    <div id="present">🎁</div>

    <!-- 💌 CARD -->
    <div id="card">
    <div id="swipeLayer"></div>

        <div class="page active">
            <img src="img1 .png">
        </div>

        <div class="page">
            <img src="img2 .png">
        </div>

        <div class="page">
            <img src="img3 .png">
        </div>
        
        <div class="page">
    <img src="img4.png">
</div>
        

         <!-- 📌 SWIPE TEXT (BOTTOM - YOU ASKED FOR THIS) -->
        <div id="swipeText">👉 Swipe left or right to change page</div>
        <div id="swipeArea"></div>

    </div>

</div>

<!-- 🔊 SOUND EFFECT -->
<audio id="boomSound">
    <source src="SE .mp3" type="audio/mp3">
</audio>

<!-- 🎶 MUSIC (AUTO PLAY AFTER CURTAIN OPEN) -->
<audio id="music" loop>
    <source src="HB .mp3" type="audio/mpeg">
</audio>

<script>

let opened = false;

/* 🎭 OPEN CURTAIN */
function openCurtain() {
    if (opened) return;

    document.body.classList.add("open");

    setTimeout(() => {
        document.getElementById("scene").classList.add("showScene");
        document.getElementById("present").style.display = "block";

        // 🎶 MUSIC STARTS HERE
        document.getElementById("music").play();

    }, 1800);

    opened = true;
}

/* 🌸 FLOWERS */
const flowers = [
    "Flowers .png",
    "Flowers2 .png",
    "Flowers3 .png"
];

function createFlower() {
    const flower = document.createElement("img");

    flower.src = flowers[Math.floor(Math.random() * flowers.length)];
    flower.className = "flower";

    flower.style.left = Math.random() * 100 + "vw";

    document.body.appendChild(flower);

    setTimeout(() => {
        flower.remove();
    }, 7000);
}

setInterval(createFlower, 300);

/* 🎁 PRESENT EXPLOSION */
const present = document.getElementById("present");
const card = document.getElementById("card");
const boomSound = document.getElementById("boomSound");

present.addEventListener("dblclick", () => {

    boomSound.play();

    present.style.display = "none";

    for (let i = 0; i < 25; i++) {
        let piece = document.createElement("div");
        piece.className = "piece";

        piece.style.left = "50%";
        piece.style.top = "60%";

        piece.style.setProperty("--x", (Math.random()*500 - 250) + "px");
        piece.style.setProperty("--y", (Math.random()*500 - 250) + "px");

        document.body.appendChild(piece);

        setTimeout(() => piece.remove(), 800);
    }

    setTimeout(() => {
        card.classList.add("show");
    }, 600);
});

/* 📖 SWIPE SYSTEM (FIXED + FULL SCREEN) */
let pages = document.querySelectorAll(".page");
let index = 0;

const swipeLayer = document.getElementById("swipeLayer");

let startX = 0;

/* TOUCH */
swipeLayer.addEventListener("touchstart",(e)=>{
    startX = e.touches[0].clientX;
});

swipeLayer.addEventListener("touchend",(e)=>{
    let endX = e.changedTouches[0].clientX;
    swipe(startX,endX);
});

/* MOUSE */
swipeLayer.addEventListener("mousedown",(e)=>{
    startX = e.clientX;
});

swipeLayer.addEventListener("mouseup",(e)=>{
    let endX = e.clientX;
    swipe(startX,endX);
});

/* SWIPE LOGIC */
function swipe(start,end){
    let diff = start - end;

    if(diff > 50 && index < pages.length - 1){
        index++;
    }

    if(diff < -50 && index > 0){
        index--;
    }

    updatePages();
}

/* SHOW ONLY ACTIVE PAGE */
function updatePages(){
    pages.forEach((p,i)=>{
        p.classList.remove("active");
        if(i === index){
            p.classList.add("active");
        }
    });
}

/* INIT */
updatePages();

</script>

</body>
</html>

</body>
</html>
